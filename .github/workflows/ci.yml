name: CI — Lint + TypeCheck + Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  agent:
    name: Agent (lint + typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: agent/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run build

  cockpit:
    name: Cockpit (lint + typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cockpit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: cockpit/package-lock.json
      - run: npm ci
      - run: npm run build

  mcp-meta-ads:
    name: MCP Meta Ads (typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp-servers/meta-ads
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mcp-servers/meta-ads/package-lock.json
      - run: npm ci
      - run: npm run build

  mcp-google-ads:
    name: MCP Google Ads (typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp-servers/google-ads
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mcp-servers/google-ads/package-lock.json
      - run: npm ci
      - run: npm run build
